<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" width="1040" height="470" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" role="img" aria-label="The golden dependency rule">
  <defs>
    <marker id="dn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#52525b" />
    </marker>
  </defs>

  <rect x="1" y="1" width="1038" height="468" rx="22" fill="#0d0d0f" stroke="#27272a" stroke-width="1.5" />
  <text x="36" y="40" font-size="17" font-weight="600" fill="#fafafa">The golden dependency rule — imports only ever point inward</text>

  <!-- engine (imports everything) -->
  <rect x="312" y="62" width="416" height="54" rx="13" fill="#1e1b34" stroke="#a78bfa" stroke-width="1.3" />
  <text x="520" y="84" font-size="15" font-weight="700" fill="#fafafa" text-anchor="middle">apps/engine</text>
  <text x="520" y="103" font-size="11.5" fill="#c4b5fd" text-anchor="middle">the daemon — imports every package</text>

  <line x1="520" y1="116" x2="520" y2="155" stroke="#52525b" stroke-width="1.6" marker-end="url(#dn)" />

  <!-- middle packages -->
  <g>
    <rect x="36" y="158" width="176" height="84" rx="13" fill="#18181b" stroke="#2e2e35" />
    <text x="124" y="194" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">db</text>
    <text x="124" y="216" font-size="11" fill="#a1a1aa" text-anchor="middle">core</text>

    <rect x="234" y="158" width="176" height="84" rx="13" fill="#18181b" stroke="#2e2e35" />
    <text x="322" y="194" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">vcs</text>
    <text x="322" y="216" font-size="11" fill="#a1a1aa" text-anchor="middle">core</text>

    <rect x="432" y="158" width="176" height="84" rx="13" fill="#18181b" stroke="#2e2e35" />
    <text x="520" y="194" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">mind</text>
    <text x="520" y="216" font-size="11" fill="#a1a1aa" text-anchor="middle">core</text>

    <rect x="630" y="158" width="176" height="84" rx="13" fill="#18181b" stroke="#2e2e35" />
    <text x="718" y="194" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">providers</text>
    <text x="718" y="216" font-size="11" fill="#a1a1aa" text-anchor="middle">core · contracts</text>

    <rect x="828" y="158" width="176" height="84" rx="13" fill="#18181b" stroke="#2e2e35" />
    <text x="916" y="194" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">capabilities</text>
    <text x="916" y="216" font-size="11" fill="#a1a1aa" text-anchor="middle">core · providers · contracts</text>
  </g>

  <line x1="520" y1="242" x2="520" y2="281" stroke="#52525b" stroke-width="1.6" marker-end="url(#dn)" />

  <!-- foundation: zero @bureau/* imports -->
  <rect x="36" y="284" width="460" height="66" rx="13" fill="#15171a" stroke="#34d399" stroke-opacity="0.45" />
  <text x="266" y="312" font-size="15" font-weight="700" fill="#fafafa" text-anchor="middle">core</text>
  <text x="266" y="333" font-size="11" fill="#a1a1aa" text-anchor="middle">domain · state machine · canPush() — no @bureau/* imports</text>

  <rect x="544" y="284" width="460" height="66" rx="13" fill="#15171a" stroke="#34d399" stroke-opacity="0.45" />
  <text x="774" y="312" font-size="15" font-weight="700" fill="#fafafa" text-anchor="middle">contracts</text>
  <text x="774" y="333" font-size="11" fill="#a1a1aa" text-anchor="middle">Zod DTOs shared with the panel — no @bureau/* imports</text>

  <line x1="774" y1="380" x2="774" y2="352" stroke="#52525b" stroke-width="1.6" marker-end="url(#dn)" />

  <!-- panel: contracts only -->
  <rect x="544" y="382" width="460" height="56" rx="13" fill="#18181b" stroke="#2e2e35" />
  <text x="774" y="408" font-size="15" font-weight="600" fill="#fafafa" text-anchor="middle">apps/panel · Next.js</text>
  <text x="774" y="427" font-size="11" fill="#a1a1aa" text-anchor="middle">imports ONLY contracts — enforced by dependency-cruiser</text>

  <text x="36" y="415" font-size="12.5" fill="#71717a">Violations are</text>
  <text x="36" y="433" font-size="12.5" fill="#71717a">CI failures, not</text>
  <text x="36" y="451" font-size="12.5" fill="#71717a">suggestions.</text>
</svg>
