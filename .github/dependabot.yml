version: 2
updates:
  # npm/pnpm dependencies across the workspace (the root lockfile covers all packages).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  # Keep the GitHub Actions used by CI current (security patches land here too).
  # Grouped into a single PR so action bumps don't spawn one branch each.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
