name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6 # version from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (tsc project references)
        run: pnpm build

      - name: Boundaries (golden dependency rule)
        run: pnpm lint:boundaries

      - name: Tests
        run: pnpm -r test

      - name: Panel typecheck
        run: pnpm --filter @bureau/panel typecheck

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history, so a key in any commit is caught

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
